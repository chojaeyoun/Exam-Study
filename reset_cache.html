<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Sushi Vinegar 새로고침</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: #f4f6f8;
      color: #17212b;
      font-family: "Malgun Gothic", "Apple SD Gothic Neo", system-ui, sans-serif;
    }

    main {
      width: min(420px, calc(100vw - 32px));
      padding: 24px;
      border: 1px solid #dde4ea;
      border-radius: 12px;
      background: #fff;
      box-shadow: 0 10px 30px rgba(23, 33, 43, 0.07);
    }

    h1 {
      margin: 0 0 8px;
      font-size: 22px;
    }

    p {
      margin: 0;
      color: #637083;
      line-height: 1.6;
    }
  </style>
</head>
<body>
  <main>
    <h1>최신 화면으로 새로고침 중</h1>
    <p>설치된 앱의 이전 캐시를 지우고 최신 학습 화면으로 이동합니다.</p>
  </main>
  <script>
    (async () => {
      if ("serviceWorker" in navigator) {
        const registrations = await navigator.serviceWorker.getRegistrations();
        await Promise.all(registrations.map(registration => registration.unregister()));
      }

      if ("caches" in window) {
        const names = await caches.keys();
        await Promise.all(names.map(name => caches.delete(name)));
      }

      location.replace("./industrial_safety_study.html?fresh=" + Date.now());
    })().catch(() => {
      location.replace("./industrial_safety_study.html?fresh=" + Date.now());
    });
  </script>
</body>
</html>
