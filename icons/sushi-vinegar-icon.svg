    <ellipse cx="303" cy="223" rx="7" ry="4" transform="rotate(22 303 223)"/>
    <ellipse cx="210" cy="313" rx="7" ry="4" transform="rotate(18 210 313)"/>
    <ellipse cx="298" cy="309" rx="7" ry="4" transform="rotate(-24 298 309)"/>
  </g>

  <path d="M383 82c25 38 61 80 61 118 0 38-27 67-61 67s-61-29-61-67c0-38 36-80 61-118Z" fill="url(#drop)" filter="url(#shadow)"/>
